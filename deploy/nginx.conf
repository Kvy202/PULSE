# Host nginx server block for PULSE. Copy to /etc/nginx/conf.d/pulse.conf on the
# EC2 box (MIRROR ships an equivalent mirror.conf). The ALB terminates TLS and
# forwards to this on port 80; nginx serves the static client and proxies the API
# and the WebSocket to the local server container — same origin, so the signed
# session cookie and CORS "just work".

server {
  listen 80;
  server_name pulse.tradyai.live;
  root /srv/pulse;        # the built Vite client (client/dist)

  # ALB health check — answered by nginx itself so it never depends on a backend.
  location = /health {
    default_type application/json;
    return 200 '{"ok":true}';
  }

  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket (Socket.io) — the Upgrade/Connection headers are what make wss work.
  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA fallback for the client routes.
  location / {
    try_files $uri /index.html;
  }
}
