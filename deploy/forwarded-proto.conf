# Shared nginx map (installed as /etc/nginx/conf.d/00-forwarded-proto.conf so it
# loads before the per-app server blocks). PULSE and MIRROR ship an identical
# copy — whichever deploys writes it.
#
# The ALB terminates TLS and records the client's real protocol in
# X-Forwarded-Proto (https). nginx itself only sees http from the ALB, so $scheme
# would be wrong — forward the ALB's header instead, falling back to $scheme when
# there is no upstream proxy (e.g. hitting nginx directly during testing).
map $http_x_forwarded_proto $fwd_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}
